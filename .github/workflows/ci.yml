name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: perf_audit
          auto-activate-base: false

      - name: Install project
        shell: bash -el {0}
        run: python -m pip install -e ".[dev,docs,gui]"

      - name: Lint
        shell: bash -el {0}
        run: ruff check .

      - name: Format check
        shell: bash -el {0}
        run: ruff format --check .

      - name: Type check
        shell: bash -el {0}
        run: mypy src

      - name: Tests
        shell: bash -el {0}
        run: pytest -m "not local_data" --cov
